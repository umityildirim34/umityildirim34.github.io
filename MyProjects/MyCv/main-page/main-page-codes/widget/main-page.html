<!doctype html>

  <title id="map-ttl-page-title"></title>

        </div>


        <div class="map-dvc-network my-animation">
          <img id="map-icn-phone" class="map-dvc-network-icon" src="../pictures/icn_phone_20240328_174201.png">

        <div class="map-dvc-network my-animation">
          <img id="map-icn-email" class="map-dvc-network-icon" src="../pictures/icn_email_20240328_174334.png">

        <h1 id="map-tt1-about-me"></h1>

        <p id="map-pgf-communication" class="map-dvc-page-text"></p>

      <img id="map-img-my-picture" class="my-animation" src="../pictures/img_my_picture_20240328_211213.jpg">
